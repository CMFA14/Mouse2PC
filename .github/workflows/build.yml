name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write # necessário para o passo de Release criar/atualizar releases

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build MouseLink/MouseLink.csproj -c Release

      - name: Publish (exe autocontido)
        run: >
          dotnet publish MouseLink/MouseLink.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MouseLink
          path: publish/MouseLink.exe

      # Em tags v* (ex.: v1.0.0), anexa o exe a um Release.
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/MouseLink.exe
          generate_release_notes: true
